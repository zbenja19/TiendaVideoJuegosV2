server:
  port: 0
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /ventas/api-docs
  packages-to-scan: com.tiendavideojuegos.tiendavideojuegos.controller

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

spring:
  application:
    name: ms-ventas-pagos

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    show-sql: true

  profiles:
    active: dev

  mvc:
    cors:
      mappings:
        "/**":
          allowed-origin-patterns: "*"
          allowed-methods: GET, POST, PUT, DELETE, PATCH, OPTIONS
          allowed-headers: "*"
          exposed-headers: "*"
          allow-credentials: false
          max-age: 3600

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    username: root
    password: ''
    url: jdbc:mysql://localhost:3306/db_ventas_pagos_dev?createDatabaseIfNotExist=true
    driverClassName: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    username: root
    password: ''
    url: jdbc:mysql://localhost:3306/db_ventas_pagos_test?createDatabaseIfNotExist=true
    driverClassName: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    username: root
    password: ''
    url: jdbc:mysql://localhost:3306/db_ventas_pagos_prod?createDatabaseIfNotExist=true
    driverClassName: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none