version: '3.8'

services:
  mariadb-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: db_catalogo_videojuegos
    networks:
      - network-tienda
    healthcheck:
      test: ["CMD", "mysql-admin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 20

  eureka-server:
    build: ./eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - network-tienda
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - network-tienda
    depends_on:
      eureka-server:
        condition: service_healthy
        
# Esta parte debe hacerse por cada microservicio, faltaria solo ms-marketing-biblioteca y ms-ventas-pagos.
  ms-catalogo-videojuegos:
    build: ./ms-catalogo-videojuegos
    container_name: ms-catalogo-videojuegos
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      DATABASE_HOST: mysql-db
      GATEWAY_URL: http://localhost:8080
    networks:
      - network-tienda
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy


 # ms-marketing-biblioteca



 # ms-ventas-pagos



networks:
  network-tienda:
    driver: bridge